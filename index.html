<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Butterfly Store</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b10;
color:white;
}

header{
padding:15px;
text-align:center;
background:linear-gradient(45deg,#00e5ff,#7b2cff);
font-weight:bold;
}

/* PRODUK */
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:10px;
padding:10px;
}

.card{
background:#161622;
padding:10px;
border-radius:10px;
}

button{
width:100%;
padding:8px;
border:none;
border-radius:8px;
background:linear-gradient(45deg,#00e5ff,#7b2cff);
color:white;
cursor:pointer;
}

/* CART BUTTON */
.cart-btn{
position:fixed;
bottom:20px;
right:20px;
background:#7b2cff;
padding:15px;
border-radius:50%;
cursor:pointer;
font-size:20px;
}

.badge{
position:absolute;
top:-5px;
right:-5px;
background:red;
color:white;
font-size:12px;
padding:3px 6px;
border-radius:50%;
}

/* CART */
.cart{
position:fixed;
top:0;
right:-100%;
width:100%;
height:100%;
background:#0b0b10;
padding:10px;
transition:0.3s;
overflow:auto;
}

.cart.active{right:0;}

.item{
background:#161622;
padding:10px;
margin-bottom:10px;
border-radius:10px;
}

/* INPUT */
input,textarea,select{
width:100%;
padding:10px;
margin:5px 0;
border:none;
border-radius:8px;
background:#1c1c2a;
color:white;
}

.checkout{
width:100%;
padding:10px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,#00e5ff,#7b2cff);
color:white;
}

.small-btn{
width:auto;
padding:5px 10px;
margin:2px;
}

.flex{
display:flex;
gap:5px;
align-items:center;
}
</style>
</head>

<body>

<header>🦋 Butterfly Store</header>

<!-- PRODUK -->
<div class="container">

<div class="card">
<h3>Glow Bracelet</h3>
<p>Rp 50.000</p>
<button onclick="add('Glow Bracelet',50000)">Tambah</button>
</div>

<div class="card">
<h3>Blue Crystal</h3>
<p>Rp 65.000</p>
<button onclick="add('Blue Crystal',65000)">Tambah</button>
</div>

<div class="card">
<h3>Elegant Charm</h3>
<p>Rp 70.000</p>
<button onclick="add('Elegant Charm',70000)">Tambah</button>
</div>

<div class="card">
<h3>Luxury Butterfly</h3>
<p>Rp 80.000</p>
<button onclick="add('Luxury Butterfly',80000)">Tambah</button>
</div>

</div>

<!-- CART BUTTON -->
<div class="cart-btn" onclick="toggle()">
🛒
<span class="badge" id="badge">0</span>
</div>

<!-- CART -->
<div class="cart" id="cart">

<h2>Keranjang</h2>
<div id="list"></div>

<h3>Data Customer</h3>

<input id="nama" placeholder="Nama">
<textarea id="alamat" placeholder="Alamat"></textarea>
<input id="wa" placeholder="No WhatsApp">

<select id="kota" onchange="render()">
<option value="10000">Palembang (10.000)</option>
<option value="20000">Jakarta (20.000)</option>
<option value="25000">Bandung (25.000)</option>
<option value="30000">Luar Kota (30.000)</option>
</select>

<h3 id="total"></h3>

<button class="checkout" onclick="checkout()">Checkout WhatsApp</button>

</div>

<script>

let cart=[];

function add(nama,harga){
let e=cart.find(i=>i.nama===nama);
if(e) e.qty++;
else cart.push({nama,harga,qty:1});
render();
}

function plus(nama){
cart.find(i=>i.nama===nama).qty++;
render();
}

function minus(nama){
let i=cart.find(i=>i.nama===nama);
i.qty--;
if(i.qty<=0) cart=cart.filter(x=>x.nama!==nama);
render();
}

function render(){

let html="";
let total=0;
let qtyAll=0;

cart.forEach(i=>{
let sub=i.harga*i.qty;
total+=sub;
qtyAll+=i.qty;

html+=`
<div class="item">
<b>${i.nama}</b><br>
Rp ${i.harga} x ${i.qty} = Rp ${sub}<br>

<div class="flex">
<button class="small-btn" onclick="minus('${i.nama}')">-</button>
<button class="small-btn" onclick="plus('${i.nama}')">+</button>
</div>

</div>`;
});

document.getElementById("list").innerHTML=html;
document.getElementById("badge").innerText=qtyAll;

let ongkir=parseInt(document.getElementById("kota").value);
document.getElementById("total").innerText="Total + Ongkir: Rp "+(total+ongkir);
}

function toggle(){
document.getElementById("cart").classList.toggle("active");
}

/* INVOICE */
function makeInvoice(order){

let c=document.createElement("canvas");
let ctx=c.getContext("2d");

c.width=650;
c.height=900;

ctx.fillStyle="#fff";
ctx.fillRect(0,0,c.width,c.height);

ctx.fillStyle="#7b2cff";
ctx.fillRect(0,0,650,70);

ctx.fillStyle="#fff";
ctx.font="bold 18px Arial";
ctx.fillText("INVOICE BUTTERFLY STORE",140,40);

ctx.fillStyle="#000";
ctx.font="14px Arial";

ctx.fillText("INV: "+order.id,30,110);
ctx.fillText("Nama: "+order.nama,30,130);
ctx.fillText("Alamat: "+order.alamat,30,150);

let y=200;
let total=0;

order.items.forEach(i=>{
let sub=i.harga*i.qty;
total+=sub;
ctx.fillText(i.nama+" x"+i.qty+" = Rp "+sub,30,y);
y+=25;
});

ctx.fillText("TOTAL: Rp "+total,30,y+40);
ctx.fillText("ONGKIR: Rp "+order.ongkir,30,y+70);
ctx.fillText("GRAND TOTAL: Rp "+(total+order.ongkir),30,y+100);

return c.toDataURL();
}

/* CHECKOUT */
function checkout(){

if(cart.length===0) return alert("Keranjang kosong");

let nama=document.getElementById("nama").value;
let alamat=document.getElementById("alamat").value;
let wa=document.getElementById("wa").value;

if(!nama||!alamat||!wa) return alert("Lengkapi data");

let ongkir=parseInt(document.getElementById("kota").value);

let order={
id:"INV"+Date.now(),
nama,alamat,wa,
items:cart,
ongkir
};

let img=makeInvoice(order);

/* download invoice */
let a=document.createElement("a");
a.href=img;
a.download=order.id+".png";
a.click();

/* whatsapp */
let msg="Order "+order.id+
"\nNama: "+nama+
"\nTotal + ongkir sudah dihitung";

window.open("https://wa.me/62"+wa.replace(/^0/,'')+"?text="+encodeURIComponent(msg));

cart=[];
render();
}

</script>

</body>
</html>
