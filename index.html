<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Butterfly Store</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b10;
color:white;
}

header{
padding:15px;
text-align:center;
background:linear-gradient(45deg,#00e5ff,#7b2cff);
font-weight:bold;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:10px;
padding:10px;
}

.card{
background:#161622;
padding:10px;
border-radius:10px;
}

button{
width:100%;
padding:8px;
border:none;
border-radius:8px;
background:linear-gradient(45deg,#00e5ff,#7b2cff);
color:white;
cursor:pointer;
}

.cart-btn{
position:fixed;
bottom:20px;
right:20px;
background:#7b2cff;
padding:15px;
border-radius:50%;
cursor:pointer;
font-size:20px;
}

.cart{
position:fixed;
top:0;
right:-100%;
width:100%;
height:100%;
background:#0b0b10;
padding:10px;
transition:0.3s;
overflow:auto;
}

.cart.active{right:0;}

.item{
background:#161622;
padding:10px;
margin-bottom:10px;
border-radius:10px;
}

input,textarea{
width:100%;
padding:10px;
margin:5px 0;
border:none;
border-radius:8px;
background:#1c1c2a;
color:white;
}

.checkout{
width:100%;
padding:10px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,#00e5ff,#7b2cff);
color:white;
}

</style>
</head>

<body>

<header>🦋 Butterfly Store</header>

<!-- PRODUK -->
<div class="container">

<div class="card">
<h3>Glow Bracelet</h3>
<p>Rp 50.000</p>
<button onclick="add('Glow Bracelet',50000)">Tambah</button>
</div>

<div class="card">
<h3>Blue Crystal</h3>
<p>Rp 65.000</p>
<button onclick="add('Blue Crystal',65000)">Tambah</button>
</div>

<div class="card">
<h3>Elegant Charm</h3>
<p>Rp 70.000</p>
<button onclick="add('Elegant Charm',70000)">Tambah</button>
</div>

<div class="card">
<h3>Luxury Butterfly</h3>
<p>Rp 80.000</p>
<button onclick="add('Luxury Butterfly',80000)">Tambah</button>
</div>

</div>

<!-- CART -->
<div class="cart-btn" onclick="toggle()">🛒</div>

<div class="cart" id="cart">

<h2>Keranjang</h2>
<div id="list"></div>

<input id="nama" placeholder="Nama Customer">
<textarea id="alamat" placeholder="Alamat Customer"></textarea>
<input id="wa" placeholder="No WhatsApp">

<button class="checkout" onclick="checkout()">Checkout</button>

</div>

<script>

let cart=[];

function add(nama,harga){
let e=cart.find(i=>i.nama===nama);
if(e){e.qty++;}
else{cart.push({nama,harga,qty:1});}
render();
}

function render(){
let html="";
cart.forEach(i=>{
html+=`
<div class="item">
<b>${i.nama}</b><br>
Qty: ${i.qty}<br>
Rp ${i.harga*i.qty}
</div>`;
});
document.getElementById("list").innerHTML=html;
}

function toggle(){
document.getElementById("cart").classList.toggle("active");
}

/* ========================= */
/* INVOICE FINAL PERFECT */
/* ========================= */
function makeInvoice(order){

let c=document.createElement("canvas");
let ctx=c.getContext("2d");

c.width=650;
c.height=950;

/* BACKGROUND */
ctx.fillStyle="#f5f7ff";
ctx.fillRect(0,0,c.width,c.height);

/* HEADER */
ctx.fillStyle="#7b2cff";
ctx.fillRect(0,0,650,80);

ctx.fillStyle="#fff";
ctx.font="bold 18px Arial";
ctx.fillText("BUTTERFLY INVOICE",200,50);

/* CUSTOMER */
ctx.fillStyle="#111";
ctx.font="14px Arial";

ctx.fillText("INV: "+order.id,30,110);
ctx.fillText("Nama: "+order.nama,30,130);
ctx.fillText("Alamat: "+order.alamat,30,150);
ctx.fillText("WA: "+order.wa,30,170);

/* REKENING */
ctx.font="bold 14px Arial";
ctx.fillText("A/N: BUTTERFLY STORE",380,110);
ctx.fillText("BANK BCA: 1234567890",380,130);
ctx.fillText("HUB: 082345577334",380,150);

/* GARIS */
ctx.fillStyle="#000";
ctx.fillRect(30,200,590,2);

/* HEADER TABLE */
ctx.fillStyle="#111";
ctx.font="bold 14px Arial";

ctx.fillText("NAMA",30,230);
ctx.fillText("HARGA",250,230);
ctx.fillText("QTY",380,230);
ctx.fillText("TOTAL",500,230);

/* ITEMS */
let y=270;
let total=0;

ctx.font="14px Arial";

order.items.forEach(i=>{

let sub=i.harga*i.qty;
total+=sub;

/* NAMA */
ctx.fillText(i.nama,30,y);

/* HARGA SATUAN (KIRI QTY) */
ctx.fillText("Rp "+i.harga,250,y);

/* QTY */
ctx.fillText("x"+i.qty,380,y);

/* TOTAL ITEM */
ctx.fillText("Rp "+sub,500,y);

y+=30;

});

/* GARIS */
ctx.fillStyle="#7b2cff";
ctx.fillRect(30,y+10,590,2);

/* TOTAL AKHIR */
ctx.fillStyle="#111";
ctx.font="bold 18px Arial";
ctx.fillText("TOTAL: Rp "+total,430,y+60);

return c.toDataURL("image/png");

}

/* CHECKOUT */
function checkout(){

let nama=document.getElementById("nama").value;
let alamat=document.getElementById("alamat").value;
let wa=document.getElementById("wa").value;

if(!nama||!alamat||!wa){
alert("Lengkapi data");
return;
}

let order={
id:"INV-"+Math.floor(Math.random()*999999),
nama,
alamat,
wa,
items:cart
};

let img=makeInvoice(order);

/* DOWNLOAD */
let a=document.createElement("a");
a.href=img;
a.download=order.id+".png";
a.click();

/* WA */
window.open(
"https://wa.me/628234557334?text="+
encodeURIComponent("Order "+order.id+" atas nama "+nama)
);

cart=[];
render();

}

</script>

</body>
</html>
